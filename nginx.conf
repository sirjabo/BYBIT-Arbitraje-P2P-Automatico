# /etc/nginx/sites-available/bybit-p2p-bot
#
# Nginx reverse proxy for Bybit P2P Bot.
# Serves the React frontend as static files and proxies
# API + WebSocket connections to the Node.js backend.
#
# Install: sudo ln -s /etc/nginx/sites-available/bybit-p2p-bot /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx

server {
    listen 80;
    server_name your-vps-ip-or-domain.com;

    # Redirect HTTP to HTTPS in production (uncomment when SSL is set up)
    # return 301 https://$host$request_uri;

    # ─── React Static Frontend ─────────────────────────────────────────────
    root /opt/bybit-p2p-bot/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Backend API (REST) ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ─── WebSocket Endpoint ────────────────────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Keep WebSocket connections alive
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 5s;

        # Disable buffering for real-time data
        proxy_buffering off;
    }

    # ─── Security Headers ──────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Block access to dotfiles
    location ~ /\. {
        deny all;
    }
}

